services:
  - type: web
    name: turkish-tutor-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://turkish-tutor-web.onrender.com
      - key: PUBLIC_API_URL
        value: https://turkish-tutor-api.onrender.com
      - key: ENABLE_API_DOCS
        value: "false"
      - key: MAX_TEXT_INPUT_CHARS
        value: "30000"
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: DATABASE_URL
        fromDatabase:
          name: turkish-tutor-db
          property: connectionString
      - key: AUTH_SESSION_DAYS
        value: "30"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "none"
      - key: PASSWORD_RESET_RETURN_TOKEN
        value: "false"
      - key: PASSWORD_RESET_BASE_URL
        value: https://turkish-tutor-web.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://turkish-tutor-api.onrender.com/api/auth/oauth/google/callback
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_REDIRECT_URI
        value: https://turkish-tutor-api.onrender.com/api/auth/oauth/github/callback
      - key: OAUTH_SUCCESS_REDIRECT_URL
        value: https://turkish-tutor-web.onrender.com/?oauth=success
      - key: OAUTH_ERROR_REDIRECT_URL
        value: https://turkish-tutor-web.onrender.com/?oauth=error
      - key: OAUTH_HANDOFF_MINUTES
        value: "5"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_SIGNUP
        value: "5/1h"
      - key: RATE_LIMIT_LOGIN
        value: "10/5m"
      - key: RATE_LIMIT_PASSWORD_RESET
        value: "5/1h"
      - key: RATE_LIMIT_PASSWORD_RESET_CONFIRM
        value: "10/1h"
      - key: RATE_LIMIT_STUDY
        value: "30/1h"
      - key: RATE_LIMIT_LESSON_WRITE
        value: "120/1h"
      - key: RATE_LIMIT_TTS
        value: "120/1h"
      - key: TTS_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE_TR
        value: nova
      - key: OPENAI_TTS_VOICE_DEFAULT
        value: alloy
      - key: OPENAI_TTS_TIMEOUT_SECONDS
        value: "45"

  - type: web
    name: turkish-tutor-web
    runtime: static
    branch: main
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://turkish-tutor-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: turkish-tutor-db
    plan: free
    databaseName: turkish_tutor
    user: turkish_tutor
