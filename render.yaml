services:
  - type: web
    name: turkish-tutor-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://turkish-tutor-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: turkish-tutor-db
          property: connectionString
      - key: AUTH_SESSION_DAYS
        value: "30"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: "none"
      - key: PASSWORD_RESET_RETURN_TOKEN
        value: "false"

  - type: web
    name: turkish-tutor-web
    runtime: static
    branch: main
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: ./out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://turkish-tutor-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: turkish-tutor-db
    plan: free
    databaseName: turkish_tutor
    user: turkish_tutor
